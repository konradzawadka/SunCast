name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:coverage

      - name: Coverage summary
        run: |
          node <<'NODE'
          const fs = require('fs')
          const summaryPath = 'coverage/coverage-summary.json'
          if (!fs.existsSync(summaryPath)) {
            throw new Error('Missing coverage summary')
          }
          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total
          const pct = (value) => (typeof value?.pct === 'number' ? value.pct.toFixed(2) : 'n/a')
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `## Coverage

- Lines: ${pct(summary.lines)}%
- Branches: ${pct(summary.branches)}%
- Functions: ${pct(summary.functions)}%
- Statements: ${pct(summary.statements)}%
`,
          )
          NODE

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

      - name: Build
        run: npm run build
